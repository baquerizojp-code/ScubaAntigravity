<!doctype html>
<html lang="en">
  <head>
    <!-- Preconnect: googleapis does not serve cross-origin resources so no crossorigin attr -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <!-- Preconnect: gstatic serves font binary files cross-origin — crossorigin is required -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- dns-prefetch as fallback for browsers that do not support preconnect -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <!-- Non-render-blocking font load: media=print trick swaps to all once loaded -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Work+Sans:wght@300;400;500;600&display=swap" media="print" onload="this.media='all'" />
    <!-- noscript fallback for users with JS disabled -->
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Work+Sans:wght@300;400;500;600&display=swap" />
    </noscript>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScubaTrip — Discover & Book Dive Trips</title>
    <meta name="description" content="Plan and book incredible dives at the best destinations in Latin America. Connect divers with world-class dive centers.">
    <meta name="author" content="ScubaTrip" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="ScubaTrip — Discover & Book Dive Trips">
    <meta property="og:description" content="Plan and book incredible dives at the best destinations in Latin America. Connect divers with world-class dive centers.">
    <meta property="og:image" content="https://scuba-trip.vercel.app/og-image.png">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ScubaTrip — Discover & Book Dive Trips">
    <meta name="twitter:description" content="Plan and book incredible dives at the best destinations in Latin America. Connect divers with world-class dive centers.">
    <meta name="twitter:image" content="https://scuba-trip.vercel.app/og-image.png">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  </head>

  </body>
</html>
